<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | Francisco Hernández</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <!-- El CSS ahora está aquí para asegurar que cargue antes que el JS -->
    <style>
        /* Estilos base mínimos para evitar parpadeos antes de que cargue el JS */
        body { margin: 0; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>

    <script>
        // 1. DATOS DEL USUARIO
        const userData = {
            nombre: "Francisco Hernández Orozco",
            codigo: "2660467",
            info: "18 años | Cali, Colombia | Nacido el 17 de septiembre de 2007",
            tagline: "Emprendedor Digital • Futuro Ingeniero de Sistemas",
            perfil: "Soy una persona con metas claras y muchas ganas de salir adelante. Me considero competitivo pero en el buen sentido. Creo que el éxito no es suerte, sino trabajo duro y disciplina diaria.",
            negocio: "Pro Services Alex G",
            experiencia: "Tengo mi propio negocio digital. Esto me ha ayudado a pagar mis cosas y la universidad sin depender de nadie. Gracias a esto me di cuenta de que la tecnología y la programación son lo mío.",
            hobbies: [
                { icon: "🚴", title: "Ciclismo", desc: "Me ayuda a despejar la cabeza y mantenerme activo." },
                { icon: "♟️", title: "Ajedrez", desc: "Gané el Top Cali a los 9 años. Me enseña a pensar antes de actuar." },
                { icon: "🎵", title: "Música", desc: "Myke Towers y Trap. Me motiva a trabajar duro por mis metas." }
            ],
            formacion: [
                { year: "Actualmente", text: "Aprendiendo bases de programación y lógica." },
                { year: "Próximo paso", text: "Ingeniería de Sistemas en la sede de Cali." },
                { year: "Meta final", text: "Especializarme en Ciberseguridad." }
            ]
        };

        // 2. INYECCIÓN DE ESTILOS (CSS)
        function injectStyles() {
            const css = `
                :root {
                    --white: #ffffff;
                    --off-white: #f8fafc;
                    --gray-light: #e2e8f0;
                    --text-dark: #1e293b;
                    --text-gray: #64748b;
                    --accent: #db2777;
                    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
                    --radius: 12px;
                }
                
                * { margin: 0; padding: 0; box-sizing: border-box; }
                
                body {
                    background-color: var(--white);
                    color: var(--text-dark);
                    line-height: 1.6;
                }

                header {
                    text-align: center;
                    padding: 4rem 1rem;
                    border-bottom: 1px solid var(--gray-light);
                }

                h1 {
                    font-family: 'Playfair Display', serif;
                    font-size: clamp(2rem, 5vw, 3rem);
                    color: var(--text-dark);
                    margin-bottom: 0.5rem;
                }

                .subtitle { color: var(--text-gray); font-weight: 500; }
                .badge {
                    display: inline-block;
                    background: var(--off-white);
                    border: 1px solid var(--gray-light);
                    padding: 0.5rem 1rem;
                    border-radius: 50px;
                    font-size: 0.9rem;
                    color: var(--accent);
                    font-weight: 700;
                    margin-bottom: 1.5rem;
                }

                .btn-grid {
                    display: grid;
                    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                    gap: 1rem;
                    max-width: 900px;
                    margin: 2rem auto 0;
                }

                .btn {
                    background: var(--white);
                    border: 1px solid var(--gray-light);
                    padding: 1rem;
                    border-radius: var(--radius);
                    cursor: pointer;
                    font-weight: 600;
                    transition: all 0.3s ease;
                    color: var(--text-dark);
                    box-shadow: var(--shadow);
                    font-family: 'Inter', sans-serif;
                }

                .btn:hover {
                    border-color: var(--accent);
                    color: var(--accent);
                    transform: translateY(-3px);
                }

                .container {
                    max-width: 1000px;
                    margin: 0 auto;
                    padding: 3rem 1.5rem;
                }

                .section-card {
                    background: var(--white);
                    border: 1px solid var(--gray-light);
                    border-radius: var(--radius);
                    padding: 2.5rem;
                    margin-bottom: 2rem;
                    box-shadow: var(--shadow);
                    opacity: 0;
                    transform: translateY(20px);
                    transition: opacity 0.6s ease, transform 0.6s ease;
                }

                .section-card.visible { opacity: 1; transform: translateY(0); }

                h2 { 
                    color: var(--text-dark); 
                    margin-bottom: 1.5rem; 
                    font-size: 1.8rem; 
                    border-left: 4px solid var(--accent); 
                    padding-left: 1rem; 
                    font-family: 'Playfair Display', serif;
                }
                
                .hobby-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
                .hobby-item { background: var(--off-white); padding: 1.5rem; border-radius: var(--radius); border: 1px solid transparent; transition: 0.3s; }
                .hobby-item:hover { border-color: var(--accent); }
                .hobby-item h3 { color: var(--accent); margin-bottom: 0.5rem; font-size: 1.2rem; }

                .timeline { border-left: 2px solid var(--gray-light); padding-left: 1.5rem; margin-top: 1rem; }
                .timeline-item { margin-bottom: 1.5rem; position: relative; }
                .timeline-item::before {
                    content: ''; position: absolute; left: -1.95rem; top: 6px;
                    width: 12px; height: 12px; background: var(--accent); border-radius: 50%; border: 2px solid white;
                }

                /* Modales */
                .modal-overlay {
                    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                    background: rgba(255, 255, 255, 0.9);
                    backdrop-filter: blur(8px);
                    z-index: 1000;
                    display: none; /* Controlado por JS */
                    justify-content: center;
                    align-items: flex-start;
                    overflow-y: auto;
                    padding: 2rem 1rem;
                }

                .modal-content {
                    background: var(--white);
                    width: 100%;
                    max-width: 800px;
                    border: 1px solid var(--gray-light);
                    border-radius: var(--radius);
                    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
                    position: relative;
                    margin-top: 2vh;
                    animation: slideUp 0.3s ease-out;
                }

                @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

                .modal-header { padding: 2rem; border-bottom: 1px solid var(--gray-light); text-align: center; }
                .modal-body { padding: 2rem; font-size: 1.05rem; }
                
                .close-btn {
                    position: absolute; top: 1.5rem; right: 1.5rem;
                    background: transparent; border: 1px solid var(--gray-light);
                    width: 40px; height: 40px; border-radius: 50%;
                    cursor: pointer; font-size: 1.2rem; color: var(--text-gray);
                    display: flex; align-items: center; justify-content: center;
                    transition: 0.2s;
                }
                .close-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

                .media-box { width: 100%; margin: 1.5rem 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--gray-light); }
                .media-box img { width: 100%; height: auto; display: block; }
                .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
                .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

                footer { text-align: center; padding: 3rem; color: var(--text-gray); border-top: 1px solid var(--gray-light); margin-top: 2rem; font-size: 0.9rem; }
            `;
            const style = document.createElement('style');
            style.innerHTML = css;
            document.head.appendChild(style);
        }

        // 3. CONSTRUCTOR DE LA INTERFAZ
        function renderApp() {
            // Limpiamos el body cuidadosamente manteniendo el script si fuera externo, 
            // pero como es interno, reescribimos todo el contenido visible.
            
            // Creamos un wrapper para el contenido visible
            const appWrapper = document.createElement('div');
            appWrapper.id = 'app-root';
            appWrapper.innerHTML = `
                <header>
                    <div class="badge">Código: ${userData.codigo}</div>
                    <h1>${userData.nombre}</h1>
                    <p class="subtitle">${userData.info}</p>
                    <p style="margin-top:0.5rem; color:var(--accent); font-weight:600;">${userData.tagline}</p>
                    
                    <div class="btn-grid" id="nav-buttons"></div>
                </header>

                <div class="container" id="main-content"></div>
                
                <footer>
                    <p>© 2026 ${userData.nombre} | Desarrollo Web con JavaScript</p>
                </footer>
            `;

            // Añadimos el wrapper al body
            document.body.appendChild(appWrapper);

            // Generamos componentes
            generateButtons();
            generateContent();
            generateModals();
            initAnimations();
        }

        // Generar Botones
        function generateButtons() {
            const activities = [
                { id: 'music', label: '🎵 Code Review' },
                { id: 'puzzle', label: '🧩 Física y Lógica' },
                { id: 'journalism', label: '🎙️ Periodismo' },
                { id: 'message', label: '💖 Agradecimiento' }
            ];

            const container = document.getElementById('nav-buttons');
            if (!container) return;

            activities.forEach(act => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = act.label;
                // Usamos addEventListener en lugar de onclick inline para mayor seguridad
                btn.addEventListener('click', () => openModal(act.id));
                container.appendChild(btn);
            });
        }

        // Generar Contenido Principal
        function generateContent() {
            const main = document.getElementById('main-content');
            if (!main) return;
            
            // Perfil
            const section1 = document.createElement('div');
            section1.className = 'section-card';
            section1.innerHTML = `<h2>Perfil Personal</h2><p>${userData.perfil}</p>`;
            main.appendChild(section1);

            // Experiencia
            const section2 = document.createElement('div');
            section2.className = 'section-card';
            section2.innerHTML = `<h2>Experiencia: ${userData.negocio}</h2><p>${userData.experiencia}</p>`;
            main.appendChild(section2);

            // Hobbies
            let hobbiesHtml = userData.hobbies.map(h => `
                <div class="hobby-item">
                    <h3>${h.icon} ${h.title}</h3>
                    <p>${h.desc}</p>
                </div>
            `).join('');

            const section3 = document.createElement('div');
            section3.className = 'section-card';
            section3.innerHTML = `<h2>Intereses</h2><div class="hobby-grid">${hobbiesHtml}</div>`;
            main.appendChild(section3);

            // Formación
            let timelineHtml = userData.formacion.map(f => `
                <div class="timeline-item">
                    <strong>${f.year}</strong>
                    <p>${f.text}</p>
                </div>
            `).join('');

            const section4 = document.createElement('div');
            section4.className = 'section-card';
            section4.innerHTML = `<h2>Formación Académica</h2><p>Estudiante de Desarrollo de Software.</p><div class="timeline">${timelineHtml}</div>`;
            main.appendChild(section4);
        }

        // Generar Modales
        function generateModals() {
            const modalsData = {
                music: {
                    title: "Análisis Musical: Myke Towers",
                    content: `
                        <p>Analizamos "Día de Cobro" para entender la diferencia entre emoción (ritmo/hardware) y sentimiento (letra/software).</p>
                        <div class="media-box"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Myke_Towers_2023.jpg/800px-Myke_Towers_2023.jpg" alt="Myke Towers"></div>
                        <p><strong>Conclusión:</strong> La música es el combustible para estudiar y emprender.</p>
                    `
                },
                puzzle: {
                    title: "Actividad Física y Lógica",
                    content: `
                        <p>Combinamos flexiones (resistencia física) con rompecabezas geométricos (lógica mental).</p>
                        <ul style="margin-left: 1.5rem; margin-top: 1rem;">
                            <li style="margin-bottom:0.5rem"><strong>Físico:</strong> Disciplina para aguantar el esfuerzo.</li>
                            <li><strong>Mental:</strong> Trabajo en equipo para resolver problemas.</li>
                        </ul>
                    `
                },
                journalism: {
                    title: "Periodismo Digital",
                    content: `
                        <p>Creación de un video noticiero grupal. Aprendimos sobre guion, cámara y edición.</p>
                        <div class="media-box">
                            <div class="video-wrap">
                                <iframe src="https://www.youtube.com/embed/zd2TUl7rpOM" allowfullscreen></iframe>
                            </div>
                        </div>
                        <p>Perdimos el miedo escénico y mejoramos nuestra comunicación.</p>
                    `
                },
                message: {
                    title: "Mensaje Final",
                    content: `
                        <h3>Gracias por estas clases</h3>
                        <p>Fueron clases dinámicas donde aprendimos haciendo. Gracias por la paciencia y por crear un ambiente de confianza.</p>
                        <p style="margin-top:1.5rem; font-style:italic; color:var(--accent); font-weight:600;">— Francisco Hernández</p>
                    `
                }
            };

            for (const [key, data] of Object.entries(modalsData)) {
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.id = `modal-${key}`;
                // Cerrar al hacer click fuera del contenido
                modal.onclick = (e) => { if(e.target === modal) closeModal(key); };
                
                modal.innerHTML = `
                    <div class="modal-content">
                        <button class="close-btn" aria-label="Cerrar">✕</button>
                        <div class="modal-header">
                            <h2>${data.title}</h2>
                        </div>
                        <div class="modal-body">
                            ${data.content}
                        </div>
                    </div>
                `;
                
                // Añadir evento al botón de cerrar interno
                const closeBtn = modal.querySelector('.close-btn');
                closeBtn.onclick = () => closeModal(key);

                document.body.appendChild(modal);
            }
        }

        // 4. LÓGICA DE INTERACCIÓN
        window.openModal = function(id) {
            const modal = document.getElementById(`modal-${id}`);
            if(modal) {
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }
        };

        window.closeModal = function(id) {
            const modal = document.getElementById(`modal-${id}`);
            if(modal) {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        };

        function initAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });
            
            document.querySelectorAll('.section-card').forEach(el => observer.observe(el));
        }

        // INICIAR APLICACIÓN
        document.addEventListener('DOMContentLoaded', () => {
            injectStyles();
            renderApp();
        });
    </script>

</body>
</html>
