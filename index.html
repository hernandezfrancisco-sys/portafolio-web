<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Universitario | Francisco & Karen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: #ffffff; }
    </style>
</head>
<body>

    <script>
        // 1. INYECCIÓN DE ESTILOS CON EFECTOS DE BORDE MUSICAL
        function injectStyles() {
            const css = `
                :root {
                    --white: #ffffff;
                    --text-dark: #1e293b;
                    --text-gray: #64748b;
                    --accent: #db2777;
                    --neon-blue: #00f2ff;
                    --neon-purple: #bd00ff;
                    --gray-light: #f1f5f9;
                }
                
                * { margin: 0; padding: 0; box-sizing: border-box; }
                
                body {
                    background-color: var(--white);
                    color: var(--text-dark);
                    min-height: 100vh;
                    overflow-x: hidden;
                    overflow-y: auto;
                }

                /* --- SISTEMA DE VISTAS --- */
                .view-container {
                    width: 100%;
                    min-height: 100vh;
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                    transition: all 0.8s cubic-bezier(0.65, 0, 0.35, 1);
                    opacity: 0;
                    pointer-events: none;
                    position: absolute;
                    top: 0; left: 0;
                    transform: translateX(50px);
                    padding: 2rem;
                }

                .view-container.active {
                    opacity: 1;
                    pointer-events: auto;
                    transform: translateX(0);
                    position: relative;
                    z-index: 10;
                }

                .view-container.exit {
                    opacity: 0;
                    transform: translateX(-50px);
                    position: absolute;
                    z-index: 1;
                }

                /* --- ESTILOS PANTALLA 1: NOMBRES --- */
                h1.name-title {
                    font-family: 'Playfair Display', serif;
                    font-size: clamp(2.5rem, 6vw, 4.5rem);
                    font-weight: 700;
                    margin: 0.5rem 0;
                    line-height: 1.1;
                    cursor: pointer;
                    transition: color 0.3s ease;
                    text-align: center;
                }
                h1.name-title:hover { color: var(--accent); }

                .letter {
                    display: inline-block;
                    animation: enterText 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards, floatWave 3s ease-in-out infinite alternate;
                }
                @keyframes enterText { from { opacity: 0; transform: translateY(40px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }
                @keyframes floatWave { 0% { transform: translateY(0); } 100% { transform: translateY(-8px); } }

                .portfolio-subtitle {
                    font-size: 0.9rem; color: var(--text-gray); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 3rem;
                    opacity: 0; animation: fadeUp 1s ease-out 2s forwards;
                    text-align: center;
                }
                @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

                .enter-hint {
                    margin-top: 4rem;
                    font-size: 0.85rem;
                    color: var(--text-gray);
                    opacity: 0;
                    animation: pulseHint 2s infinite 3s;
                    cursor: pointer;
                    border: 1px solid var(--gray-light);
                    padding: 0.8rem 2rem;
                    border-radius: 50px;
                    transition: all 0.3s;
                }
                .enter-hint:hover { border-color: var(--accent); color: var(--accent); background: #fff0f5; }
                @keyframes pulseHint { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

                /* --- ESTILOS PANTALLA 2: ANÁLISIS MUSICAL --- */
                .analysis-wrapper {
                    max-width: 900px;
                    width: 100%;
                    text-align: left;
                    padding-bottom: 4rem;
                    padding-top: 2rem;
                    position: relative;
                    z-index: 2;
                }

                .analysis-header { text-align: center; margin-bottom: 2rem; }
                .analysis-header h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 0.5rem; }
                .song-tag {
                    display: inline-block; background: var(--gray-light); padding: 0.4rem 1.2rem;
                    border-radius: 50px; font-size: 0.9rem; color: var(--accent); font-weight: 600;
                }

                .intro-text {
                    font-size: 1.1rem; line-height: 1.8; color: var(--text-gray);
                    margin-bottom: 2.5rem; text-align: justify;
                }

                /* --- NUEVO: BORDES LATERALES TIPO ECUALIZADOR --- */
                .equalizer-border {
                    position: fixed;
                    top: 0; bottom: 0;
                    width: 60px;
                    display: flex;
                    flex-direction: column;
                    justify-content: space-between;
                    padding: 10px 0;
                    z-index: 1;
                    pointer-events: none;
                }
                .eq-left { left: 0; border-right: 1px solid rgba(0,0,0,0.05); background: linear-gradient(to right, transparent, rgba(255,255,255,0.8)); }
                .eq-right { right: 0; border-left: 1px solid rgba(0,0,0,0.05); background: linear-gradient(to left, transparent, rgba(255,255,255,0.8)); }

                .eq-bar {
                    width: 4px;
                    margin: 0 auto;
                    border-radius: 2px;
                    animation: eqBounce 1s ease-in-out infinite alternate;
                }
                
                /* Colores y tiempos variados para simular música real */
                .eq-bar:nth-child(odd) { background-color: var(--accent); height: 20px; }
                .eq-bar:nth-child(even) { background-color: var(--neon-blue); height: 30px; }
                .eq-bar:nth-child(3n) { background-color: var(--neon-purple); height: 15px; }

                .eq-left .eq-bar { animation-delay: calc(var(--i) * -0.1s); }
                .eq-right .eq-bar { animation-delay: calc(var(--i) * -0.15s); }

                @keyframes eqBounce {
                    0% { height: 10px; opacity: 0.5; transform: scaleY(0.8); }
                    100% { height: 60px; opacity: 1; transform: scaleY(1.2); }
                }

                /* Ocultar ecualizador en móviles para no tapar contenido */
                @media (max-width: 768px) {
                    .equalizer-border { display: none; }
                    .analysis-wrapper { padding: 2rem 1rem; }
                }

                /* TARJETAS Y CONTENIDO */
                .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
                .info-card {
                    background: var(--white); border: 1px solid var(--gray-light); border-radius: 16px;
                    padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.03); transition: all 0.3s ease;
                }
                .info-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 8px 25px rgba(219, 39, 119, 0.1); }
                .card-icon { font-size: 2rem; margin-bottom: 1rem; display: block; }
                .info-card h3 { font-size: 1.3rem; margin-bottom: 1rem; color: var(--text-dark); }
                .info-card p { font-size: 1rem; line-height: 1.7; color: var(--text-gray); }

                .highlight-box {
                    background: linear-gradient(135deg, #fff0f5, #ffffff); border-left: 4px solid var(--accent);
                    padding: 1.5rem 2rem; border-radius: 0 12px 12px 0; margin-top: 2rem;
                }
                .highlight-box h3 { color: var(--accent); margin-bottom: 0.5rem; font-size: 1.2rem; }
                .highlight-box p { font-size: 1.05rem; line-height: 1.7; color: var(--text-dark); }

                .back-btn {
                    margin-top: 3rem; background: transparent; border: 1px solid var(--gray-light);
                    padding: 0.8rem 2rem; border-radius: 50px; cursor: pointer; font-size: 0.9rem;
                    color: var(--text-gray); transition: all 0.3s; display: block; margin: 3rem auto 0;
                }
                .back-btn:hover { border-color: var(--text-dark); color: var(--text-dark); background: var(--gray-light); }

                footer { 
                    text-align: center; padding: 2rem; color: #94a3b8; font-size: 0.8rem; 
                    border-top: 1px solid var(--gray-light); margin-top: auto; width: 100%;
                }
            `;
            const style = document.createElement('style');
            style.innerHTML = css;
            document.head.appendChild(style);
        }

        // 2. FUNCIONES DE ANIMACIÓN DE TEXTO
        function animateText(element, startDelay) {
            if (!element) return;
            const text = element.innerText;
            element.innerHTML = ''; 
            [...text].forEach((char, index) => {
                const span = document.createElement('span');
                span.className = 'letter';
                span.innerText = char === ' ' ? '\u00A0' : char;
                const delay = startDelay + (index * 0.06);
                span.style.animationDelay = `${delay}s, ${delay + 0.8}s`; 
                element.appendChild(span);
            });
        }

        // 3. LÓGICA DE NAVEGACIÓN
        function navigateToAnalysis() {
            const view1 = document.getElementById('view-intro');
            const view2 = document.getElementById('view-analysis');
            
            if(view1 && view2) {
                view1.classList.remove('active');
                view1.classList.add('exit');
                
                setTimeout(() => {
                    view2.classList.add('active');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 400);
            }
        }

        function navigateToIntro() {
            const view1 = document.getElementById('view-intro');
            const view2 = document.getElementById('view-analysis');
            
            if(view1 && view2) {
                view2.classList.remove('active');
                
                setTimeout(() => {
                    view1.classList.remove('exit');
                    view1.classList.add('active');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 400);
            }
        }

        // 4. CONSTRUCTOR DE LA INTERFAZ
        function renderApp() {
            // Vista 1: Introducción
            const viewIntro = document.createElement('div');
            viewIntro.id = 'view-intro';
            viewIntro.className = 'view-container active';
            viewIntro.innerHTML = `
                <h1 class="name-title" id="name1">Francisco Hernández Orozco</h1>
                <h1 class="name-title" id="name2">Karen Yulieth Vivas Castro</h1>
                <p class="portfolio-subtitle">Portafolio (Inserción a la vida universitaria)</p>
                <div class="enter-hint" onclick="navigateToAnalysis()">Ver Análisis Musical →</div>
            `;

            // Vista 2: Análisis Musical
            const viewAnalysis = document.createElement('div');
            viewAnalysis.id = 'view-analysis';
            viewAnalysis.className = 'view-container';
            
            // Generar barras del ecualizador dinámicamente
            let barsHTML = '';
            for(let i=0; i<20; i++) {
                barsHTML += `<div class="eq-bar" style="--i:${i}"></div>`;
            }

            viewAnalysis.innerHTML = `
                <!-- BORDES LATERALES MUSICALES -->
                <div class="equalizer-border eq-left">${barsHTML}</div>
                <div class="equalizer-border eq-right">${barsHTML}</div>

                <div class="analysis-wrapper">
                    <div class="analysis-header">
                        <h2>Análisis Musical: Emoción vs. Sentimiento</h2>
                        <span class="song-tag">🎵 Día de Cobro – Myke Towers</span>
                    </div>

                    <p class="intro-text">
                        La música es una forma de expresión capaz de influir profundamente en nosotros. En este análisis, se explora la diferencia entre la emoción (reacción inmediata al ritmo) y el sentimiento (comprensión reflexiva de la letra) utilizando el tema <strong>Día de Cobro</strong>, una canción de trap latino enfocada en el esfuerzo y la superación personal.
                    </p>

                    <!-- SE ELIMINÓ LA IMAGEN DEL ARTISTA PARA EVITAR ERRORES -->

                    <div class="cards-grid">
                        <div class="info-card">
                            <span class="card-icon">⚡</span>
                            <h3>La Emoción (El Ritmo)</h3>
                            <p>Produce energía, adrenalina y motivación automática. La base intensa y acelerada hace que el cuerpo reaccione de inmediato, incluso antes de escuchar la letra. Es lo que podemos llamar el <strong>"hardware reaccionando"</strong>.</p>
                        </div>

                        <div class="info-card">
                            <span class="card-icon">💭</span>
                            <h3>El Sentimiento (La Letra)</h3>
                            <p>Transmite ambición, perseverancia y ganas de progresar. Al comprender el mensaje sobre el sacrificio que hay detrás del éxito, el oyente lo relaciona con sus propias metas. Este proceso representa el <strong>"software procesando el dato"</strong>.</p>
                        </div>
                    </div>

                    <div class="highlight-box">
                        <h3>✨ Persistencia del Mensaje</h3>
                        <p>Es de alta persistencia. La combinación de un ritmo enérgico con una letra reflexiva hace que el mensaje no sea pasajero; se queda en la mente del oyente, impulsándolo a pensar en su propio futuro.</p>
                    </div>

                    <button class="back-btn" onclick="navigateToIntro()">← Volver al Inicio</button>
                </div>
            `;

            document.body.appendChild(viewIntro);
            document.body.appendChild(viewAnalysis);

            const footer = document.createElement('footer');
            footer.innerText = "© 2026 Portafolio Académico | Francisco & Karen";
            document.body.appendChild(footer);

            // Iniciar animaciones de texto
            setTimeout(() => {
                animateText(document.getElementById('name1'), 0.2);
                animateText(document.getElementById('name2'), 1.8);
            }, 100);
        }

        // INICIAR APLICACIÓN
        document.addEventListener('DOMContentLoaded', () => {
            injectStyles();
            renderApp();
        });
    </script>

</body>
</html>
